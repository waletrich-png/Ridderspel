// ---------------- Geluid ----------------
let audioCtx = null;
let soundOn = true;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, delay) {
  if (!soundOn || !audioCtx) return;
  delay = delay || 0;
  const t0 = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}

function sfxJump() {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, t0);
  osc.frequency.exponentialRampToValueAtTime(650, t0 + 0.1);
  gain.gain.setValueAtTime(0.12, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.15);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.16);
}

function sfxCoin() {
  playTone(880, 0.08, 'sine', 0.18, 0);
  playTone(1320, 0.12, 'sine', 0.14, 0.06);
}

function sfxHurt() {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, t0);
  osc.frequency.exponentialRampToValueAtTime(50, t0 + 0.4);
  gain.gain.setValueAtTime(0.2, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.42);
}

function sfxLevelComplete() {
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => playTone(f, 0.18, 'triangle', 0.16, i * 0.12));
}

function sfxGameComplete() {
  const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
  notes.forEach((f, i) => playTone(f, 0.25, 'triangle', 0.18, i * 0.15));
}

function sfxDragonRoar() {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(90, t0);
  osc.frequency.linearRampToValueAtTime(70, t0 + 0.3);
  gain.gain.setValueAtTime(0.1, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.32);
}

document.getElementById('soundBtn').addEventListener('click', () => {
  initAudio();
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';

  for (const d of level.dragons) d.x = d._startX !== undefined ? d._startX : d.x;

// ---------------- Besturing ----------------
let input = { left: false, right: false, jump: false };

function setupBtn(id, key) {
  const el = document.getElementById(id);
  const start = (e) => { e.preventDefault(); initAudio(); input[key] = true; el.classList.add('active'); };
  const end = (e) => { e.preventDefault(); input[key] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart', start);
  el.addEventListener('touchend', end);
  el.addEventListener('touchcancel', end);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', end);
  el.addEventListener('mouseleave', end);
}
setupBtn('leftBtn', 'left');
setupBtn('rightBtn', 'right');
setupBtn('jumpBtn', 'jump');

window.addEventListener('keydown', (e) => {
  initAudio();
  if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
  if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') input.jump = true;
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
  if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') input.jump = false;
});

let jumpHeld = false;

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  frameCount++;

  // Draken bewegen altijd (ook als speler dood/gewonnen is, maakt niet uit)
  for (const d of level.dragons) {
    d.x += d.speed * d.dir;
    if (d.x < d.minX) { d.x = d.minX; d.dir = 1; }
    if (d.x > d.maxX) { d.x = d.maxX; d.dir = -1; }
    if (frameCount % 180 === 0 && Math.random() < 0.3) sfxDragonRoar();
  }

  if (player.dead || player.won) return;

  if (input.left) { player.vx = -MOVE_SPEED; player.facing = -1; }
  else if (input.right) { player.vx = MOVE_SPEED; player.facing = 1; }
  else { player.vx = 0; }

  if (input.jump && player.onGround && !jumpHeld) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    sfxJump();
  }
  jumpHeld = input.jump;

  player.vy += GRAVITY;
  if (player.vy > 18) player.vy = 18;

  player.x += player.vx;
  player.onGround = false;

  for (const p of level.platforms) {
    if (rectsOverlap({x: player.x, y: player.y, w: player.w, h: player.h}, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
    }
  }

  player.y += player.vy;
  for (const p of level.platforms) {
    if (rectsOverlap({x: player.x, y: player.y, w: player.w, h: player.h}, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > level.width) player.x = level.width - player.w;

  if (player.y > 700 && !player.dead) {
    player.dead = true;
    sfxHurt();
    showMessage('U bent in de slotgracht gevallen! 💀', 'Probeer opnieuw');
  }

  for (const s of level.spikes) {
    if (!player.dead && rectsOverlap({x: player.x, y: player.y, w: player.w, h: player.h}, s)) {
      player.dead = true;
      sfxHurt();
      showMessage('Doorboord door ijzeren pieken! 💀', 'Probeer opnieuw');
    }
  }

  for (const d of level.dragons) {
    if (!player.dead && rectsOverlap({x: player.x, y: player.y, w: player.w, h: player.h}, d)) {
      player.dead = true;
      sfxHurt();
      showMessage('Verslagen door een draak! 🐉💀', 'Probeer opnieuw');
    }
  }

  for (const c of level.coins) {
    if (!c.collected) {
      const dx = (player.x + player.w/2) - c.x;
      const dy = (player.y + player.h/2) - c.y;
      if (Math.sqrt(dx*dx + dy*dy) < 12 + 20) {
        c.collected = true;
        coinsCollected++;
        document.getElementById('coinCount').textContent = coinsCollected;
        sfxCoin();
      }
    }
  }

  if (!player.won && player.x + player.w > level.flagX) {
    player.won = true;
    if (currentLevelIndex === LEVELS.length - 1) {
      sfxGameComplete();
      showMessage('🏰 Het kasteel is heroverd! Alle 5 levels voltooid!<br>Goud: ' + coinsCollected + ' / ' + level.coins.length, 'Opnieuw vanaf level 1');
    } else {
      sfxLevelComplete();
      showMessage('🚩 Level ' + (currentLevelIndex + 1) + ' voltooid!<br>Goud: ' + coinsCollected + ' / ' + level.coins.length, 'Volgend level');
    }
  }

  camX = player.x - canvas.width / 3;
  if (camX < 0) camX = 0;
  if (camX > level.width - canvas.width) camX = level.width - canvas.width;
}

function showMessage(text, btnLabel) {
  document.getElementById('messageText').innerHTML = text;
  document.getElementById('restartBtn').textContent = btnLabel;
  document.getElementById('message').style.display = 'block';
}

document.getElementById('restartBtn').addEventListener('click', () => {
  initAudio();
  if (player.won) {
    if (currentLevelIndex === LEVELS.length - 1) {
      loadLevel(0);
    } else {
      loadLevel(currentLevelIndex + 1);
    }
  } else {
    loadLevel(currentLevelIndex);
  }
});

function drawBackground() {
  ctx.fillStyle = 'rgba(120,140,110,0.5)';
  for (let i = 0; i < 5; i++) {
    const hx = (i * 400 - camX * 0.15) % (canvas.width + 400) - 200;
    ctx.beginPath();
    ctx.ellipse(hx, canvas.height - 40, 260, 90, 0, Math.PI, 0);
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(70,70,90,0.55)';
  for (let i = 0; i < 3; i++) {
    const cx = (i * 700 - camX * 0.25) % (canvas.width + 500) - 100;
    const baseY = canvas.height - 130;
    ctx.fillRect(cx, baseY, 140, 130);
    for (let t = 0; t < 5; t++) {
      ctx.fillRect(cx + t*30, baseY - 16, 18, 16);
    }
    ctx.fillRect(cx - 20, baseY - 40, 30, 170);
    ctx.beginPath();
    ctx.moveTo(cx - 25, baseY - 40);
    ctx.lineTo(cx - 5, baseY - 70);
    ctx.lineTo(cx + 15, baseY - 40);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(cx + 110, baseY - 40, 30, 170);
    ctx.beginPath();
    ctx.moveTo(cx + 105, baseY - 40);
    ctx.lineTo(cx + 125, baseY - 70);
    ctx.lineTo(cx + 145, baseY - 40);
    ctx.closePath();
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(40,40,40,0.5)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const bx = (i * 300 - camX * 0.4) % (canvas.width + 200);
    const by = 50 + (i % 2) * 30;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx+8, by-8, bx+16, by);
    ctx.moveTo(bx+16, by);
    ctx.quadraticCurveTo(bx+24, by-8, bx+32, by);
    ctx.stroke();
  }
}

function drawDragon(d) {
  const wobble = Math.sin((frameCount + d.x) * 0.15) * 4;
  const bodyColor = '#3a7d3a';
  const darkColor = '#245524';

  ctx.save();
  ctx.translate(d.x + d.w/2, d.y + d.h/2 + wobble * 0.2);
  ctx.scale(d.dir, 1);

  // Staart
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.moveTo(-d.w/2, 4);
  ctx.quadraticCurveTo(-d.w/2 - 18, 10 + wobble, -d.w/2 - 26, -4 + wobble);
  ctx.lineTo(-d.w/2 - 10, 2);
  ctx.closePath();
  ctx.fill();

  // Vleugels
  ctx.fillStyle = 'rgba(60,110,60,0.85)';
  ctx.beginPath();
  ctx.moveTo(-4, -6);
  ctx.lineTo(-4 - 16, -22 - wobble);
  ctx.lineTo(6, -10);
  ctx.closePath();
  ctx.fill();

  // Lijf
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, d.w/2 - 4, d.h/2 - 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Kop
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(d.w/2 - 6, -4, 13, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // Hoorntjes
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.moveTo(d.w/2 - 10, -12);
  ctx.lineTo(d.w/2 - 6, -20);
  ctx.lineTo(d.w/2 - 3, -12);
  ctx.closePath();
  ctx.fill();

  // Oog
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(d.w/2 - 2, -6, 2.5, 0, Math.PI*2);
  ctx.fill();

  // Vuurtje
  if (frameCount % 40 < 20) {
    ctx.fillStyle = 'rgba(255,140,0,0.9)';
    ctx.beginPath();
    ctx.moveTo(d.w/2 + 6, -3);
    ctx.lineTo(d.w/2 + 18, -6);
    ctx.lineTo(d.w/2 + 18, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,220,0,0.9)';
    ctx.beginPath();
    ctx.moveTo(d.w/2 + 6, -1);
    ctx.lineTo(d.w/2 + 13, -2);
    ctx.lineTo(d.w/2 + 13, 1);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  ctx.save();
  ctx.translate(-camX, 0);

  for (const p of level.platforms) {
    const grad = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
    grad.addColorStop(0, '#9a9a92');
    grad.addColorStop(1, '#6b6b62');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#4a7c2f';
    ctx.fillRect(p.x, p.y, p.w, 6);
    ctx.strokeStyle = 'rgba(50,50,45,0.5)';
    ctx.lineWidth = 1;
    const brickH = 14, brickW = 28;
    let row = 0;
    for (let by = p.y + 6; by < p.y + p.h; by += brickH) {
      const offset = (row % 2 === 0) ? 0 : brickW / 2;
      for (let bx = p.x - offset; bx < p.x + p.w; bx += brickW) {
        ctx.strokeRect(bx, by, brickW, brickH);
      }
      row++;
    }
  }

  ctx.fillStyle = '#5a5a5a';
  for (const s of level.spikes) {
    const n = Math.floor(s.w / 20);
    for (let i = 0; i < n; i++) {
      ctx.beginPath();
      ctx.moveTo(s.x + i*20, s.y + s.h);
      ctx.lineTo(s.x + i*20 + 10, s.y);
      ctx.lineTo(s.x + i*20 + 20, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
  }

  for (const c of level.coins) {
    if (c.collected) continue;
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#8a6d00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#8a6d00';
    ctx.font = 'bold 12px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♛', c.x, c.y + 1);
  }

  for (const d of level.dragons) drawDragon(d);

  ctx.fillStyle = '#7a5230';
  ctx.fillRect(level.flagX, level.groundY - 150, 8, 150);
  ctx.fillStyle = '#c9a24b';
  ctx.beginPath();
  ctx.arc(level.flagX + 4, level.groundY - 150, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#8b1a1a';
  ctx.beginPath();
  ctx.moveTo(level.flagX + 8, level.groundY - 145);
  ctx.lineTo(level.flagX + 65, level.groundY - 130);
  ctx.lineTo(level.flagX + 8, level.groundY - 115);
  ctx.lineTo(level.flagX + 20, level.groundY - 130);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e0b84b';
  ctx.font = 'bold 14px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('♛', level.flagX + 32, level.groundY - 128);

  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  const armorColor = player.dead ? '#888' : '#c0c0c8';
  const armorShade = player.dead ? '#666' : '#8a8a92';

  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(px + 4, py + ph - 12, 9, 12);
  ctx.fillRect(px + pw - 13, py + ph - 12, 9, 12);

  ctx.fillStyle = armorColor;
  ctx.fillRect(px + 2, py + 16, pw - 4, ph - 24);
  ctx.fillStyle = armorShade;
  ctx.fillRect(px + 2, py + 16, pw - 4, 6);

  ctx.fillStyle = player.dead ? '#777' : '#8b1a1a';
  ctx.beginPath();
  ctx.moveTo(px + pw/2, py + 22);
  ctx.lineTo(px + pw/2 - 6, py + 26);
  ctx.lineTo(px + pw/2 - 6, py + 32);
  ctx.lineTo(px + pw/2, py + 37);
  ctx.lineTo(px + pw/2 + 6, py + 32);
  ctx.lineTo(px + pw/2 + 6, py + 26);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = armorColor;
  ctx.fillRect(px - 2, py + 18, 6, 16);
  ctx.fillRect(px + pw - 4, py + 18, 6, 16);

  ctx.fillStyle = armorColor;
  ctx.beginPath();
  ctx.arc(px + pw/2, py + 10, 12, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(px + pw/2 - 12, py + 8, 24, 10);

  ctx.fillStyle = '#1a1a1a';
  const visorX = player.facing > 0 ? px + pw/2 - 1 : px + pw/2 - 9;
  ctx.fillRect(visorX, py + 9, 10, 3);

  ctx.fillStyle = '#8b1a1a';
  ctx.beginPath();
  ctx.moveTo(px + pw/2, py - 2);
  ctx.lineTo(px + pw/2 - 4, py + 8);
  ctx.lineTo(px + pw/2 + 4, py + 8);
  ctx.closePath();
  ctx.fill();

  if (!player.dead) {
    ctx.strokeStyle = '#d9d9d9';
    ctx.lineWidth = 3;
    const swordX = player.facing > 0 ? px + pw + 10 : px - 10;
    ctx.beginPath();
    ctx.moveTo(player.facing > 0 ? px + pw - 2 : px + 2, py + 26);
    ctx.lineTo(swordX, py + 20);
    ctx.stroke();
    ctx.strokeStyle = '#7a5230';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(player.facing > 0 ? px + pw - 4 : px + 4, py + 28);
    ctx.lineTo(player.facing > 0 ? px + pw + 2 : px - 2, py + 26);
    ctx.stroke();
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
